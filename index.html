Action: file_editor create /app/neon-dash/index.html --file-text "<!DOCTYPE html>
<html lang=\"tr\">
<head>
<meta charset=\"UTF-8\" />
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />
<title>Neon Dash</title>
<style>
  :root {
    --neon: #00f0ff;
    --bg: #000;
    --brightness: 1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #wrap {
    position: relative;
    width: 100vw; height: 100vh;
    filter: brightness(var(--brightness));
    transition: filter 0.2s;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
    background: #000;
  }

  /* HUD */
  .hud {
    position: absolute;
    top: 18px;
    padding: 10px 18px;
    border: 2px solid var(--neon);
    border-radius: 8px;
    background: rgba(0,0,0,0.55);
    color: var(--neon);
    text-shadow:
      0 0 4px var(--neon),
      0 0 10px var(--neon),
      0 0 20px var(--neon);
    box-shadow:
      0 0 8px var(--neon),
      0 0 18px rgba(0, 240, 255, 0.45),
      inset 0 0 10px rgba(0, 240, 255, 0.18);
    font-weight: bold;
    letter-spacing: 2px;
    transition: color 0.3s, border-color 0.3s, box-shadow 0.3s, text-shadow 0.3s;
  }
  #score {
    left: 18px;
    font-size: 22px;
    min-width: 130px;
  }
  #score .label { font-size: 11px; opacity: 0.85; display: block; letter-spacing: 3px; }
  #score .val { font-size: 28px; }

  #settingsBtn {
    right: 18px;
    cursor: pointer;
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    font-size: 24px;
  }
  #settingsBtn:hover { transform: scale(1.05); }
  #settingsBtn .gear {
    width: 26px; height: 26px;
    border: 2px solid var(--neon);
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 8px var(--neon);
  }
  #settingsBtn .gear::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 2px solid var(--neon);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--neon);
  }

  /* Settings panel */
  #settingsPanel {
    position: absolute;
    top: 82px;
    right: 18px;
    width: 280px;
    padding: 20px;
    border: 2px solid var(--neon);
    border-radius: 12px;
    background: rgba(0,0,0,0.85);
    box-shadow: 0 0 18px var(--neon), inset 0 0 14px rgba(0,240,255,0.15);
    backdrop-filter: blur(8px);
    display: none;
    z-index: 10;
  }
  #settingsPanel.open { display: block; animation: slideIn 0.25s ease; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  #settingsPanel h3 {
    color: var(--neon);
    text-shadow: 0 0 8px var(--neon);
    letter-spacing: 3px;
    margin-bottom: 14px;
    font-size: 14px;
  }
  .setting {
    margin-bottom: 16px;
  }
  .setting label {
    display: block;
    font-size: 11px;
    color: var(--neon);
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-shadow: 0 0 4px var(--neon);
  }
  .setting input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: #222;
    border-radius: 2px;
    outline: none;
  }
  .setting input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    background: var(--neon);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px var(--neon);
  }
  .setting input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px;
    background: var(--neon);
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 8px var(--neon);
  }
  .diff-buttons { display: flex; gap: 6px; }
  .diff-buttons button {
    flex: 1;
    padding: 8px 0;
    background: transparent;
    color: var(--neon);
    border: 1px solid var(--neon);
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-shadow: 0 0 4px var(--neon);
    transition: all 0.2s;
  }
  .diff-buttons button:hover { box-shadow: 0 0 10px var(--neon); }
  .diff-buttons button.active {
    background: var(--neon);
    color: #000;
    text-shadow: none;
    box-shadow: 0 0 14px var(--neon);
  }

  /* overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.65);
    z-index: 5;
    backdrop-filter: blur(4px);
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 64px;
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon), 0 0 24px var(--neon), 0 0 40px var(--neon);
    letter-spacing: 8px;
    margin-bottom: 18px;
    animation: pulse 2s ease-in-out infinite;
  }
  .overlay p {
    color: var(--neon);
    font-size: 14px;
    letter-spacing: 4px;
    text-shadow: 0 0 6px var(--neon);
    margin-bottom: 28px;
  }
  .overlay button {
    background: transparent;
    color: var(--neon);
    border: 2px solid var(--neon);
    padding: 14px 40px;
    font-size: 16px;
    letter-spacing: 4px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 8px;
    text-shadow: 0 0 6px var(--neon);
    box-shadow: 0 0 12px var(--neon), inset 0 0 8px rgba(0,240,255,0.2);
    transition: all 0.25s;
  }
  .overlay button:hover {
    background: var(--neon);
    color: #000;
    text-shadow: none;
    transform: scale(1.05);
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.65; }
  }

  @media (max-width: 600px) {
    .overlay h1 { font-size: 42px; letter-spacing: 4px; }
    #score .val { font-size: 22px; }
    #settingsPanel { width: calc(100vw - 36px); right: 18px; }
  }
</style>
</head>
<body>
<div id=\"wrap\">
  <canvas id=\"game\"></canvas>

  <div id=\"score\" class=\"hud\" data-testid=\"score-display\">
    <span class=\"label\">SCORE</span>
    <span class=\"val\" id=\"scoreVal\">0</span>
  </div>

  <button id=\"settingsBtn\" class=\"hud\" data-testid=\"settings-btn\" aria-label=\"Settings\">
    <span class=\"gear\"></span>
  </button>

  <div id=\"settingsPanel\" data-testid=\"settings-panel\">
    <h3>SETTINGS</h3>
    <div class=\"setting\">
      <label>BRIGHTNESS <span id=\"brightVal\">100%</span></label>
      <input type=\"range\" id=\"brightness\" min=\"30\" max=\"150\" value=\"100\" data-testid=\"brightness-slider\"/>
    </div>
    <div class=\"setting\">
      <label>VOLUME <span id=\"volVal\">60%</span></label>
      <input type=\"range\" id=\"volume\" min=\"0\" max=\"100\" value=\"60\" data-testid=\"volume-slider\"/>
    </div>
    <div class=\"setting\">
      <label>DIFFICULTY</label>
      <div class=\"diff-buttons\">
        <button data-diff=\"easy\" data-testid=\"diff-easy\">EASY</button>
        <button data-diff=\"normal\" data-testid=\"diff-normal\" class=\"active\">NORMAL</button>
        <button data-diff=\"hard\" data-testid=\"diff-hard\">HARD</button>
      </div>
    </div>
  </div>

  <div id=\"startScreen\" class=\"overlay\" data-testid=\"start-screen\">
    <h1>NEON DASH</h1>
    <p>SPACE / TAP TO JUMP</p>
    <button id=\"startBtn\" data-testid=\"start-btn\">START</button>
  </div>

  <div id=\"gameOverScreen\" class=\"overlay hidden\" data-testid=\"gameover-screen\">
    <h1>GAME OVER</h1>
    <p>SCORE: <span id=\"finalScore\">0</span> &nbsp;&nbsp; BEST: <span id=\"bestScore\">0</span></p>
    <button id=\"restartBtn\" data-testid=\"restart-btn\">RETRY</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const root = document.documentElement;

  // ----- Setup -----
  let W, H, GROUND_Y;
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    GROUND_Y = H - Math.max(80, H * 0.18);
  }
  window.addEventListener('resize', resize);
  resize();

  // ----- Neon colors -----
  const NEON_COLORS = [
    '#00f0ff', // cyan
    '#ff00d4', // magenta
    '#39ff14', // lime
    '#bf00ff', // purple
    '#ffea00', // yellow
    '#ff3860', // pink-red
    '#00ff9d', // mint
    '#ff8c00', // neon orange
  ];
  let currentColor = NEON_COLORS[0];
  function setNeon(color) {
    currentColor = color;
    root.style.setProperty('--neon', color);
  }

  // ----- Audio (WebAudio, no files) -----
  let audioCtx = null;
  let masterGain = null;
  function ensureAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.6;
    masterGain.connect(audioCtx.destination);
  }
  function setVolume(v) {
    if (masterGain) masterGain.gain.value = v;
  }
  function beep(freq, dur = 0.08, type = 'square') {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = 0.0001;
    g.gain.exponentialRampToValueAtTime(0.4, audioCtx.currentTime + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(masterGain);
    o.start();
    o.stop(audioCtx.currentTime + dur + 0.02);
  }

  // ----- Game state -----
  const DIFFICULTIES = {
    easy:   { speed: 5.5,  gravity: 0.75, jump: 14, gap: [320, 460] },
    normal: { speed: 7.5,  gravity: 0.95, jump: 15.5, gap: [260, 400] },
    hard:   { speed: 9.5,  gravity: 1.15, jump: 17, gap: [220, 340] },
  };
  let difficulty = 'normal';
  let cfg = DIFFICULTIES[difficulty];

  const player = {
    x: 0, y: 0, size: 44,
    vy: 0, onGround: true, rot: 0,
  };
  let obstacles = [];
  let particles = [];
  let starField = [];
  let score = 0;
  let best = parseInt(localStorage.getItem('neonDashBest') || '0', 10);
  let running = false;
  let gameOver = false;
  let spawnDist = 0;
  let nextSpawn = 300;
  let speedBoost = 1; // grows over time

  function initStars() {
    starField = [];
    for (let i = 0; i < 80; i++) {
      starField.push({
        x: Math.random() * W,
        y: Math.random() * H,
        s: Math.random() * 1.6 + 0.3,
        v: Math.random() * 0.4 + 0.15,
      });
    }
  }
  initStars();

  function reset() {
    player.x = Math.max(90, W * 0.18);
    player.y = GROUND_Y - player.size;
    player.vy = 0;
    player.onGround = true;
    player.rot = 0;
    obstacles = [];
    particles = [];
    score = 0;
    spawnDist = 0;
    nextSpawn = 280;
    speedBoost = 1;
    setNeon(NEON_COLORS[0]);
    document.getElementById('scoreVal').textContent = '0';
  }

  function startGame() {
    reset();
    running = true;
    gameOver = false;
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    ensureAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function endGame() {
    running = false;
    gameOver = true;
    if (score > best) {
      best = score;
      localStorage.setItem('neonDashBest', String(best));
    }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('bestScore').textContent = best;
    document.getElementById('gameOverScreen').classList.remove('hidden');
    beep(120, 0.18, 'sawtooth');
    setTimeout(() => beep(80, 0.25, 'sawtooth'), 90);
    burst(player.x + player.size/2, player.y + player.size/2, currentColor, 30);
  }

  function jump() {
    if (!running) return;
    if (player.onGround) {
      player.vy = -cfg.jump;
      player.onGround = false;
      beep(660, 0.07, 'square');
    }
  }

  function spawnObstacle() {
    const minH = 36, maxH = 90;
    const tall = Math.random() < 0.35;
    const h = tall ? maxH + Math.random() * 30 : minH + Math.random() * (maxH - minH);
    const w = 28 + Math.random() * 22;
    obstacles.push({
      x: W + 30,
      y: GROUND_Y - h,
      w, h,
      passed: false,
      color: NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)],
    });
  }

  function burst(x, y, color, count = 14) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = Math.random() * 6 + 2;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1,
        life: 1,
        color,
        size: Math.random() * 3 + 2,
      });
    }
  }

  // ----- Render helpers -----
  function neonRect(x, y, w, h, color, glow = 18) {
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = glow;
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(x, y, w, h);
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = color;
    ctx.strokeRect(x, y, w, h);
    // inner stroke
    ctx.shadowBlur = glow * 0.5;
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 4, y + 4, w - 8, h - 8);
    ctx.restore();
  }

  function drawStars() {
    ctx.save();
    for (const s of starField) {
      ctx.fillStyle = `rgba(255,255,255,${0.3 + s.s * 0.3})`;
      ctx.fillRect(s.x, s.y, s.s, s.s);
    }
    ctx.restore();
  }

  function drawGround() {
    // glowing line
    ctx.save();
    ctx.shadowColor = currentColor;
    ctx.shadowBlur = 20;
    ctx.strokeStyle = currentColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(W, GROUND_Y);
    ctx.stroke();

    // grid lines moving
    ctx.shadowBlur = 0;
    ctx.strokeStyle = `${currentColor}33`;
    ctx.lineWidth = 1;
    const gridSize = 40;
    const offset = (gridScroll % gridSize);
    for (let x = -offset; x < W; x += gridSize) {
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y);
      ctx.lineTo(x - 60, H);
      ctx.stroke();
    }
    for (let y = GROUND_Y; y < H; y += 18) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawPlayer() {
    ctx.save();
    const cx = player.x + player.size / 2;
    const cy = player.y + player.size / 2;
    ctx.translate(cx, cy);
    ctx.rotate(player.rot);
    neonRect(-player.size/2, -player.size/2, player.size, player.size, currentColor, 24);
    // inner dot
    ctx.shadowColor = currentColor;
    ctx.shadowBlur = 14;
    ctx.fillStyle = currentColor;
    ctx.fillRect(-4, -4, 8, 8);
    ctx.restore();
  }

  function drawObstacles() {
    for (const o of obstacles) {
      neonRect(o.x, o.y, o.w, o.h, o.color, 18);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 12;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
      ctx.restore();
    }
  }

  let gridScroll = 0;

  // ----- Update loop -----
  function update(dt) {
    const speed = cfg.speed * speedBoost;
    gridScroll += speed;

    // stars
    for (const s of starField) {
      s.x -= s.v * speed * 0.5;
      if (s.x < 0) { s.x = W; s.y = Math.random() * GROUND_Y; }
    }

    if (!running) return;

    // player physics
    player.vy += cfg.gravity;
    player.y += player.vy;
    if (!player.onGround) player.rot += 0.18;
    if (player.y + player.size >= GROUND_Y) {
      player.y = GROUND_Y - player.size;
      player.vy = 0;
      player.onGround = true;
      // snap rotation to nearest quarter
      player.rot = Math.round(player.rot / (Math.PI / 2)) * (Math.PI / 2);
    }

    // obstacles
    spawnDist += speed;
    if (spawnDist > nextSpawn) {
      spawnObstacle();
      spawnDist = 0;
      const [a, b] = cfg.gap;
      nextSpawn = a + Math.random() * (b - a);
    }

    for (const o of obstacles) {
      o.x -= speed;
      // pass detection
      if (!o.passed && o.x + o.w < player.x) {
        o.passed = true;
        score++;
        document.getElementById('scoreVal').textContent = score;
        // change color on each obstacle passed
        let next;
        do {
          next = NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)];
        } while (next === currentColor);
        setNeon(next);
        beep(880 + Math.random() * 220, 0.06, 'triangle');
        burst(player.x + player.size, player.y + player.size/2, next, 10);
        // gradual difficulty ramp
        speedBoost = Math.min(1.6, 1 + score * 0.02);
      }
      // collision (AABB)
      if (
        player.x + player.size - 6 > o.x &&
        player.x + 6 < o.x + o.w &&
        player.y + player.size - 6 > o.y &&
        player.y + 6 < o.y + o.h
      ) {
        endGame();
      }
    }
    obstacles = obstacles.filter(o => o.x + o.w > -50);

    // particles
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.18;
      p.life -= 0.02;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    // bg
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawStars();
    drawGround();
    drawObstacles();
    drawPlayer();
    drawParticles();
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(33, now - last);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ----- Input -----
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      if (!running && !gameOver) startGame();
      else if (gameOver) startGame();
      else jump();
    }
  });
  canvas.addEventListener('pointerdown', () => {
    if (!running && !gameOver) startGame();
    else if (gameOver) startGame();
    else jump();
  });

  document.getElementById('startBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    startGame();
  });
  document.getElementById('restartBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    startGame();
  });

  // ----- Settings -----
  const panel = document.getElementById('settingsPanel');
  document.getElementById('settingsBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    panel.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (!panel.contains(e.target) && e.target.id !== 'settingsBtn' && !e.target.closest('#settingsBtn')) {
      panel.classList.remove('open');
    }
  });

  const brightInput = document.getElementById('brightness');
  brightInput.addEventListener('input', () => {
    const v = brightInput.value;
    document.getElementById('brightVal').textContent = v + '%';
    root.style.setProperty('--brightness', (v / 100).toString());
    localStorage.setItem('neonDashBright', v);
  });

  const volInput = document.getElementById('volume');
  volInput.addEventListener('input', () => {
    const v = volInput.value;
    document.getElementById('volVal').textContent = v + '%';
    setVolume(v / 100);
    localStorage.setItem('neonDashVol', v);
  });

  document.querySelectorAll('.diff-buttons button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-buttons button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      difficulty = btn.dataset.diff;
      cfg = DIFFICULTIES[difficulty];
      localStorage.setItem('neonDashDiff', difficulty);
    });
  });

  // restore saved settings
  (function restore() {
    const b = localStorage.getItem('neonDashBright');
    if (b) { brightInput.value = b; brightInput.dispatchEvent(new Event('input')); }
    const v = localStorage.getItem('neonDashVol');
    if (v) { volInput.value = v; }
    const d = localStorage.getItem('neonDashDiff');
    if (d && DIFFICULTIES[d]) {
      difficulty = d;
      c
