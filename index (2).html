<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Counter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 44px;
      font-family: 'Segoe UI', sans-serif;
      user-select: none;
      overflow: hidden;
    }

    .counter {
      font-size: 96px;
      font-weight: 800;
      color: #00ff88;
      text-shadow: 0 0 30px rgba(0,255,136,0.5);
      font-family: monospace;
      min-width: 160px;
      text-align: center;
      transition: transform 0.08s ease;
    }
    .counter.bump { transform: scale(1.13); }

    .click-btn {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: linear-gradient(145deg, #00ff88, #00cc6a);
      border: none;
      cursor: pointer;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
      box-shadow: 0 0 55px rgba(0,255,136,0.35), 0 8px 25px rgba(0,0,0,0.5);
      transition: transform 0.08s ease, box-shadow 0.15s ease;
      outline: none;
    }
    .click-btn:hover {
      box-shadow: 0 0 75px rgba(0,255,136,0.55), 0 10px 30px rgba(0,0,0,0.6);
    }
    .click-btn:active { transform: scale(0.91); }

    .click-btn svg { pointer-events: none; }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%,
        rgba(255,255,255,0.9),
        rgba(0,255,136,0.6) 50%,
        rgba(0,200,100,0.2)
      );
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    .reset-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 13px 34px;
      background: linear-gradient(145deg, #00ff88, #00cc6a);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(0,255,136,0.3), 0 6px 20px rgba(0,0,0,0.4);
      transition: all 0.15s ease;
      outline: none;
      font-family: inherit;
    }
    .reset-btn:hover {
      box-shadow: 0 0 50px rgba(0,255,136,0.5), 0 8px 25px rgba(0,0,0,0.5);
      transform: translateY(-2px);
    }
    .reset-btn:active { transform: scale(0.96); }

    @media (max-width: 480px) {
      .counter { font-size: 72px; }
      .click-btn { width: 155px; height: 155px; }
    }
  </style>
</head>
<body>

  <div class="counter" id="counter">0</div>

  <button class="click-btn" id="clickBtn" aria-label="Tıkla">
    <svg width="68" height="68" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4
               M9 3v18m0 0h10a2 2 0 0 0 2-2V9
               M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
    </svg>
  </button>

  <button class="reset-btn" id="resetBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1 4 1 10 7 10"/>
      <path d="M3.51 15a9 9 0 1 0 .49-3.44"/>
    </svg>
    Reset
  </button>

  <script>
    let count = 0;
    const counterEl = document.getElementById('counter');
    const clickBtn  = document.getElementById('clickBtn');
    const resetBtn  = document.getElementById('resetBtn');

    function spawnBubbles(e) {
      const rect = clickBtn.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      for (let i = 0; i < 8; i++) {
        const b = document.createElement('span');
        b.className = 'bubble';
        const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.5;
        const dist  = 55 + Math.random() * 55;
        const size  = 8  + Math.random() * 12;
        b.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px`;
        clickBtn.appendChild(b);
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        b.animate([
          { transform: `translate(-50%,-50%) scale(0.3)`, opacity: 1 },
          { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(1.2)`, opacity: 0 }
        ], { duration: 800, easing: 'cubic-bezier(0.2,0.6,0.3,1)', fill: 'forwards' })
        .onfinish = () => b.remove();
      }
    }

    clickBtn.addEventListener('click', e => {
      count++;
      counterEl.textContent = count;
      counterEl.classList.remove('bump');
      void counterEl.offsetWidth;
      counterEl.classList.add('bump');
      setTimeout(() => counterEl.classList.remove('bump'), 120);
      spawnBubbles(e);
    });

    resetBtn.addEventListener('click', () => {
      count = 0;
      counterEl.textContent = '0';
    });
  </script>

</body>
</html>
